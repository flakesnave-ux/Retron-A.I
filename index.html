<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReTron A.I - Phiên bản Tron-Fast-2026</title>
    
    <style>
        /* --- GIAO DIỆN DARK MODE TỐI ƯU CHO MÀN HÌNH MAC --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-color: #0b0b0b;
            --container-bg: #161616;
            --header-bg: #1f1f1f;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --ai-bubble: #262626;
            --user-bubble: #007aff; /* Màu xanh đặc trưng của Apple */
            --accent: #00d2ff;
            --border: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 95%;
            max-width: 900px;
            height: 85vh;
            background-color: var(--container-bg);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* Header */
        header {
            padding: 20px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: #555;
            border-radius: 50%;
            transition: 0.3s;
        }

        .status-dot.active {
            background: #34c759;
            box-shadow: 0 0 10px #34c759;
        }

        #status-text {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        /* Loading Bar */
        .progress-container {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        /* Chat Window */
        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 1rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .ai {
            align-self: flex-start;
            background: var(--ai-bubble);
            border-bottom-left-radius: 2px;
        }

        .user {
            align-self: flex-end;
            background: var(--user-bubble);
            border-bottom-right-radius: 2px;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: var(--header-bg);
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border);
        }

        textarea {
            flex: 1;
            background: #222;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            padding: 12px;
            resize: none;
            outline: none;
            height: 45px;
        }

        button {
            background: var(--user-bubble);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <header>
            <div class="header-top">
                <div id="status-dot" class="status-dot"></div>
                <h2>Tron-Fast-2026</h2>
                <span id="status-text">Đang chuẩn bị...</span>
            </div>
            <div id="progress-container" class="progress-container">
                <div id="progress-fill"></div>
            </div>
        </header>

        <div id="chat-window">
            <div class="message ai">Chào Changg! Tôi là bộ não Tron-Fast-2026 chạy bằng WebGPU trên máy Mac của bạn.</div>
        </div>

        <div class="input-area">
            <textarea id="user-input" placeholder="Chờ Tron khởi động..." disabled></textarea>
            <button id="send-btn" disabled>Gửi</button>
        </div>
    </div>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const progressFill = document.getElementById('progress-fill');
        const progressContainer = document.getElementById('progress-container');

        // Model Tron-Fast-2026 (Nền tảng Llama-3 siêu nhanh)
        const MODEL_ID = "Llama-3-8B-Instruct-v0.1-q4f32_1-MLC";
        
        let engine;

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function initAI() {
            progressContainer.style.display = 'block';
            statusText.innerText = "Đang tải não bộ Tron (vui lòng đợi)...";

            try {
                // Khởi tạo Engine AI trực tiếp trên WebGPU của Mac
                engine = await webllm.CreateMLCEngine(MODEL_ID, {
                    initProgressCallback: (report) => {
                        const match = report.text.match(/\[(\d+)%\]/);
                        if (match) {
                            progressFill.style.width = match[1] + "%";
                        }
                        console.log(report.text);
                    }
                });

                statusDot.classList.add('active');
                statusText.innerText = "Tron đã sẵn sàng trên GPU Mac!";
                progressContainer.style.display = 'none';
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.placeholder = "Nhập câu hỏi của bạn...";
                addMessage('ai', 'Kết nối thành công! Tôi có thể suy nghĩ ngay bây giờ.');

            } catch (err) {
                statusText.innerText = "Lỗi: Hãy dùng Chrome/Edge bản mới nhất!";
                addMessage('ai', 'Lỗi khởi động: Trình duyệt này không hỗ trợ WebGPU.');
                console.error(err);
            }
        }

        async function handleChat() {
            const text = userInput.value.trim();
            if (!text || sendBtn.disabled) return;

            addMessage('user', text);
            userInput.value = "";
            sendBtn.disabled = true;
            userInput.disabled = true;

            const messages = [
                { role: "system", content: "Bạn là Tron-Fast-2026, AI mạnh mẽ được tạo bởi Changg. Trả lời bằng tiếng Việt thân thiện." },
                { role: "user", content: text }
            ];

            try {
                // AI thực hiện suy nghĩ cục bộ
                const reply = await engine.chat.completions.create({ messages });
                addMessage('ai', reply.choices[0].message.content);
            } catch (e) {
                addMessage('ai', 'Có lỗi xảy ra trong lúc suy nghĩ.');
            }

            sendBtn.disabled = false;
            userInput.disabled = false;
            userInput.focus();
        }

        sendBtn.onclick = handleChat;
        userInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleChat(); } };

        // Khởi động
        initAI();
    </script>
</body>
</html>
